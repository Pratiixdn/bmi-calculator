services:
  - type: web
    name: bmi-calculator
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn bmi_project.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: bmi_project.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: abcdef123456randomlongstring987654321xyz